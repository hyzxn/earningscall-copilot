<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>EarningsCall Copilot</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans+KR:wght@300;400;600&display=swap');

    :root {
      --bg: #0a0e13;
      --surface: #111820;
      --border: #1e2d3d;
      --accent: #00d4aa;
      /* 터미널 그린-틸 */
      --warn: #f59e0b;
      --neg: #f43f5e;
      --pos: #22d3ee;
      --muted: #4a6278;
      --text: #c8d8e8;
      --text-dim: #6b8299;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans KR', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── 헤더 ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    header h1 {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-transform: uppercase;
    }

    #status-bar {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      flex: 1;
    }

    #elapsed {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      min-width: 60px;
      text-align: right;
    }

    /* 녹음 상태 점 */
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .dot.recording {
      background: var(--neg);
      animation: pulse 1.2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.3
      }
    }

    /* ── 컨트롤 바 ── */
    .controls {
      display: flex;
      gap: 8px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      align-items: center;
    }

    button {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      padding: 6px 16px;
      border: 1px solid var(--border);
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.15s;
      background: transparent;
      color: var(--text-dim);
    }

    #btn-start {
      border-color: var(--accent);
      color: var(--accent);
    }

    #btn-start:hover {
      background: var(--accent);
      color: var(--bg);
    }

    #btn-stop {
      border-color: var(--neg);
      color: var(--neg);
    }

    #btn-stop:hover {
      background: var(--neg);
      color: #fff;
    }

    #btn-analyze {
      border-color: var(--warn);
      color: var(--warn);
      margin-left: auto;
    }

    #btn-analyze:hover {
      background: var(--warn);
      color: var(--bg);
    }

    button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .label-small {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }

    /* ── 3분할 메인 ── */
    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      background: var(--border);
      flex: 1;
      overflow: hidden;
      transition: grid-template-columns 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .panel {
      background: var(--surface);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .panel-title {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .panel-badge {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 1px 6px;
      border-radius: 2px;
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
      scroll-behavior: smooth;
      transition: opacity 0.25s ease;
    }

    .panel-body::-webkit-scrollbar {
      width: 4px;
    }

    .panel-body::-webkit-scrollbar-track {
      background: transparent;
    }

    .panel-body::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    /* ── 자막 패널 ── */
    .transcript-line {
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.7;
      color: var(--text);
      padding: 3px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }

    .transcript-line .ts {
      color: var(--muted);
      font-size: 10px;
      margin-right: 8px;
    }

    .transcript-line.new {
      color: #fff;
    }

    /* ── 요약 패널 ── */
    .summary-block {
      margin-bottom: 16px;
    }

    .summary-block .sum-time {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .summary-block .sum-time::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .summary-block p {
      font-size: 12.5px;
      line-height: 1.75;
      color: var(--text);
      white-space: pre-wrap;
    }

    /* ── 지표 패널 ── */
    .metric-section {
      margin-bottom: 16px;
    }

    .metric-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .metric-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 4px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      font-size: 12px;
    }

    .metric-row .key {
      color: var(--text-dim);
    }

    .metric-row .val {
      font-family: var(--mono);
      font-weight: 600;
      color: var(--pos);
    }

    .metric-row .val.neg {
      color: var(--neg);
    }

    .metric-row .val.neutral {
      color: var(--text);
    }

    .tone-badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 2px;
      letter-spacing: 0.05em;
    }

    .tone-긍정 {
      background: rgba(34, 211, 238, 0.15);
      color: var(--pos);
    }

    .tone-중립 {
      background: rgba(245, 158, 11, 0.15);
      color: var(--warn);
    }

    .tone-부정 {
      background: rgba(244, 63, 94, 0.15);
      color: var(--neg);
    }

    .quote-box {
      border-left: 2px solid var(--accent);
      padding: 4px 10px;
      margin: 4px 0;
      font-size: 11.5px;
      color: var(--text-dim);
      font-style: italic;
      line-height: 1.6;
    }

    .topics-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 4px;
    }

    .topic-chip {
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 8px;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text-dim);
    }

    .empty-hint {
      color: var(--muted);
      font-size: 11px;
      font-family: var(--mono);
      padding-top: 8px;
      line-height: 1.8;
    }

    .panel.hidden {
      overflow: hidden;
    }

    .panel.hidden .panel-header {
      justify-content: center;
      padding: 8px 0;
    }

    .panel.hidden .panel-body {
      opacity: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .panel.hidden .panel-title,
    .panel.hidden .panel-badge {
      display: none;
    }

    .panel-toggle {
      font-family: var(--mono);
      font-size: 14px;
      padding: 4px 0;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      line-height: 1;
      width: 100%;
    }

    .panel-toggle:hover {
      border-color: var(--text-dim);
      color: var(--text);
    }

    .panel-toggle:disabled {
      opacity: 0.2;
      cursor: not-allowed;
    }

    .spinner {
      display: inline-block;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── 키워드 하이라이팅 ── */
    .keyword-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .keyword-bar label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    #keyword-input {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 4px 10px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text);
      outline: none;
    }

    #keyword-input:focus {
      border-color: var(--accent);
    }

    #keyword-input::placeholder {
      color: var(--muted);
    }

    mark.pos {
      background: rgba(34, 211, 238, 0.25);
      color: #6efff0;
      border-radius: 2px;
      padding: 0 2px;
    }

    mark.neg {
      background: rgba(244, 63, 94, 0.25);
      color: #ff8099;
      border-radius: 2px;
      padding: 0 2px;
    }

    .keyword-bar {
      flex-wrap: wrap;
      gap: 6px 12px;
    }

    .kw-group {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      min-width: 200px;
    }

    .kw-group label.pos {
      color: #6efff0;
    }

    .kw-group label.neg {
      color: #ff8099;
    }

    /* -- 전사 검색 -- */
    .search-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .search-bar label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    #search-input {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 4px 10px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text);
      outline: none;
    }

    #search-input:focus {
      border-color: var(--accent);
    }

    #search-input::placeholder {
      color: var(--muted);
    }

    #btn-search {
      border-color: var(--accent);
      color: var(--accent);
    }

    #btn-search:hover {
      background: var(--accent);
      color: var(--bg);
    }

    #btn-search-clear {
      border-color: var(--muted);
      color: var(--muted);
    }

    #btn-search-clear:hover {
      background: var(--muted);
      color: var(--bg);
    }

    #search-count {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      min-width: 60px;
      text-align: right;
    }

    mark.search-match {
      background: rgba(0, 212, 170, 0.35);
      color: #fff;
      border-radius: 2px;
      padding: 0 2px;
    }
  </style>
</head>

<body>

  <header>
    <div class="dot" id="dot"></div>
    <h1>EarningsCall Copilot</h1>
    <span id="status-bar">대기 중</span>
    <span id="elapsed">00:00</span>
  </header>

  <div class="controls">
    <button id="btn-start">▶ 시작</button>
    <button id="btn-stop" disabled>■ 중지</button>
    <select id="whisper-lang" style="font-family:var(--mono);font-size:11px;background:transparent;border:1px solid var(--border);border-radius:3px;padding:4px 8px;color:var(--text);outline:none;cursor:pointer;">
      <option value="ko">한국어</option>
      <option value="en">English</option>
    </select>
    <span class="label-small" id="word-count">0 단어</span>
    <button id="btn-analyze" disabled>⚡ 즉시 분석</button>
  </div>


  <div class="keyword-bar">
    <div class="kw-group">
      <label class="pos" style="font-family:var(--mono);font-size:10px;letter-spacing:0.08em;white-space:nowrap">▲
        긍정</label>
      <input id="keyword-pos" type="text" placeholder="beat, raised, strong, 상향, 성장..."
        style="flex:1;background:transparent;border:1px solid var(--border);border-radius:3px;padding:4px 10px;font-family:var(--mono);font-size:11px;color:var(--text);outline:none;"
        onfocus="this.style.borderColor='#6efff0'" onblur="this.style.borderColor='var(--border)'">
    </div>
    <div class="kw-group">
      <label class="neg" style="font-family:var(--mono);font-size:10px;letter-spacing:0.08em;white-space:nowrap">▼
        부정</label>
      <input id="keyword-neg" type="text" placeholder="miss, lowered, weak, 하향, 우려..."
        style="flex:1;background:transparent;border:1px solid var(--border);border-radius:3px;padding:4px 10px;font-family:var(--mono);font-size:11px;color:var(--text);outline:none;"
        onfocus="this.style.borderColor='#ff8099'" onblur="this.style.borderColor='var(--border)'">
    </div>
  </div>
  <div class="search-bar">
    <label>검색</label>
    <input id="search-input" type="text" placeholder="전사 텍스트 검색...">
    <button id="btn-search">검색</button>
    <button id="btn-search-clear">지우기</button>
    <span id="search-count"></span>
  </div>
  <div class="panels">
    <!-- 패널 1: 실시간 자막 -->
    <div class="panel" data-panel="transcript">
      <div class="panel-header">
        <span class="panel-title">실시간 자막</span>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="panel-badge" id="stt-model">—</span>
          <button class="panel-toggle" data-toggle="transcript" title="패널 숨기기">=</button>
        </div>
      </div>
      <div class="panel-body" id="transcript-panel">
        <div class="empty-hint">▶ 시작을 누르면 컴퓨터 재생 소리를 전사합니다.</div>
      </div>
    </div>

    <!-- 패널 2: AI 요약 -->
    <div class="panel" data-panel="summary">
      <div class="panel-header">
        <span class="panel-title">AI 요약</span>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="panel-badge" id="ai-model">—</span>
          <button class="panel-toggle" data-toggle="summary" title="패널 숨기기">=</button>
        </div>
      </div>
      <div class="panel-body" id="summary-panel">
        <div class="empty-hint">지정된 시간마다 자동으로 업데이트됩니다.<br>⚡ 즉시 분석 버튼으로 강제 실행 가능.</div>
      </div>
    </div>

    <!-- 패널 3: 주요 지표 -->
    <div class="panel" data-panel="metrics">
      <div class="panel-header">
        <span class="panel-title">주요 지표</span>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="panel-badge" id="metrics-updated">—</span>
          <button class="panel-toggle" data-toggle="metrics" title="패널 숨기기">=</button>
        </div>
      </div>
      <div class="panel-body" id="metrics-panel">
        <div class="empty-hint">EPS, 매출, 가이던스 등<br>언급된 지표를 자동 추출합니다.</div>
      </div>
    </div>
  </div>

  <script>
    let ws = null;
    let startTime = null;
    let elapsedTimer = null;
    let wordCount = 0;
    let isFirstTranscript = true;

    const $ = id => document.getElementById(id);

    // 경과 시간
    function startElapsed() {
      startTime = Date.now();
      elapsedTimer = setInterval(() => {
        const sec = Math.floor((Date.now() - startTime) / 1000);
        const m = String(Math.floor(sec / 60)).padStart(2, '0');
        const s = String(sec % 60).padStart(2, '0');
        $('elapsed').textContent = `${m}:${s}`;
      }, 1000);
    }
    function stopElapsed() {
      clearInterval(elapsedTimer);
    }

    function now() {
      return new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    // 자막 추가
    function parseKeywords(id) {
      return $(id).value.split(',').map(k => k.trim()).filter(Boolean);
    }

    function highlightKeywords(text) {
      const escape = k => k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const pos = parseKeywords('keyword-pos');
      const neg = parseKeywords('keyword-neg');
      if (pos.length) {
        text = text.replace(new RegExp(`(${pos.map(escape).join('|')})`, 'gi'), '<mark class="pos">$1</mark>');
      }
      if (neg.length) {
        text = text.replace(new RegExp(`(${neg.map(escape).join('|')})`, 'gi'), '<mark class="neg">$1</mark>');
      }
      return text;
    }

    function appendTranscript(text) {
      const panel = $('transcript-panel');
      if (isFirstTranscript) {
        panel.innerHTML = '';
        isFirstTranscript = false;
      }
      const div = document.createElement('div');
      div.className = 'transcript-line new';
      div.dataset.raw = text;
      div.innerHTML = `<span class="ts">${now()}</span>${highlightKeywords(text)}`;
      panel.appendChild(div);
      panel.scrollTop = panel.scrollHeight;

      // 새 항목 하이라이트 페이드
      setTimeout(() => div.classList.remove('new'), 2000);

      // 단어 수 업데이트
      wordCount += text.split(/\s+/).filter(Boolean).length;
      $('word-count').textContent = `${wordCount.toLocaleString()} 단어`;
    }

    // 요약 추가
    function appendSummary(text) {
      const panel = $('summary-panel');
      if (panel.querySelector('.empty-hint')) panel.innerHTML = '';

      const block = document.createElement('div');
      block.className = 'summary-block';
      const timeDiv = document.createElement('div');
      timeDiv.className = 'sum-time';
      timeDiv.textContent = `${now()} 기준`;
      const p = document.createElement('p');
      p.textContent = text;
      block.appendChild(timeDiv);
      block.appendChild(p);
      panel.insertBefore(block, panel.firstChild);
    }

    // 지표 렌더링
    function renderMetrics(data) {
      const panel = $('metrics-panel');
      panel.innerHTML = '';
      $('metrics-updated').textContent = now() + ' 업데이트';

      const add = (label, rows) => {
        const sec = document.createElement('div');
        sec.className = 'metric-section';
        const labelDiv = document.createElement('div');
        labelDiv.className = 'metric-label';
        labelDiv.textContent = label;
        sec.appendChild(labelDiv);
        rows.forEach(([k, v, cls = '']) => {
          if (!v || v === 'null') return;
          const row = document.createElement('div');
          row.className = 'metric-row';
          const keySpan = document.createElement('span');
          keySpan.className = 'key';
          keySpan.textContent = k;
          const valSpan = document.createElement('span');
          valSpan.className = `val ${cls}`;
          valSpan.textContent = v;
          row.appendChild(keySpan);
          row.appendChild(valSpan);
          sec.appendChild(row);
        });
        if (sec.querySelectorAll('.metric-row').length > 0) panel.appendChild(sec);
      };

      // EPS
      if (data.eps) {
        const eps = data.eps;
        const beat = eps.beat_miss;
        const beatClass = beat && beat.includes('beat') ? '' : beat && beat.includes('miss') ? 'neg' : 'neutral';
        add('EPS', [
          ['실적', eps.actual, ''],
          ['컨센서스', eps.consensus, 'neutral'],
          ['결과', eps.beat_miss, beatClass],
        ]);
      }

      // 매출
      if (data.revenue) {
        const r = data.revenue;
        add('매출', [
          ['실적', r.actual && r.unit ? `${r.actual} ${r.unit}` : r.actual, ''],
          ['YoY 성장', r.yoy_growth, r.yoy_growth && r.yoy_growth.startsWith('-') ? 'neg' : ''],
        ]);
      }

      // 마진 / 가이던스
      add('수익성', [['영업이익률', data.operating_margin, '']]);

      if (data.guidance) {
        add('가이던스', [
          ['다음 분기', data.guidance.next_quarter, 'neutral'],
          ['연간', data.guidance.full_year, 'neutral'],
        ]);
      }

      // 경영진 톤
      if (data.management_tone) {
        const tone = data.management_tone;
        const toneKey = tone.includes('긍정') ? '긍정' : tone.includes('부정') ? '부정' : '중립';
        const sec = document.createElement('div');
        sec.className = 'metric-section';
        const labelDiv = document.createElement('div');
        labelDiv.className = 'metric-label';
        labelDiv.textContent = '경영진 톤';
        const badge = document.createElement('span');
        badge.className = `tone-badge tone-${toneKey}`;
        badge.textContent = tone;
        sec.appendChild(labelDiv);
        sec.appendChild(badge);
        panel.appendChild(sec);
      }

      // 핵심 토픽
      if (data.key_topics && data.key_topics.length > 0) {
        const sec = document.createElement('div');
        sec.className = 'metric-section';
        const labelDiv = document.createElement('div');
        labelDiv.className = 'metric-label';
        labelDiv.textContent = '주요 토픽';
        const wrap = document.createElement('div');
        wrap.className = 'topics-wrap';
        data.key_topics.forEach(t => {
          const chip = document.createElement('span');
          chip.className = 'topic-chip';
          chip.textContent = t;
          wrap.appendChild(chip);
        });
        sec.appendChild(labelDiv);
        sec.appendChild(wrap);
        panel.appendChild(sec);
      }

      // 주요 발언
      if (data.notable_quotes && data.notable_quotes.length > 0) {
        const sec = document.createElement('div');
        sec.className = 'metric-section';
        const labelDiv = document.createElement('div');
        labelDiv.className = 'metric-label';
        labelDiv.textContent = '주요 발언';
        sec.appendChild(labelDiv);
        data.notable_quotes.forEach(q => {
          const box = document.createElement('div');
          box.className = 'quote-box';
          box.textContent = `"${q}"`;
          sec.appendChild(box);
        });
        panel.appendChild(sec);
      }

      // 파싱 에러
      if (data.parse_error) {
        const sec = document.createElement('div');
        sec.className = 'metric-section';
        const labelDiv = document.createElement('div');
        labelDiv.className = 'metric-label';
        labelDiv.style.color = 'var(--neg)';
        labelDiv.textContent = '파싱 오류';
        const hint = document.createElement('div');
        hint.className = 'empty-hint';
        hint.textContent = data.parse_error;
        sec.appendChild(labelDiv);
        sec.appendChild(hint);
        panel.appendChild(sec);
      }
    }

    // WebSocket 연결
    function connect(lang) {
      ws = new WebSocket(`ws://${location.host}/ws`);

      ws.onopen = () => {
        // 언어 설정 전송
        ws.send(JSON.stringify({ type: "set_lang", lang: lang }));
        $('btn-start').disabled = true;
        $('btn-stop').disabled = false;
        $('btn-analyze').disabled = false;
        $('dot').classList.add('recording');
        startElapsed();
      };

      ws.onmessage = e => {
        let msg;
        try {
          msg = JSON.parse(e.data);
        } catch (err) {
          console.error('Invalid WS message:', err);
          return;
        }
        if (msg.type === 'status') {
          $('status-bar').textContent = msg.text;
          if (msg.text.includes('모델:')) {
            // 모델 정보 파싱
            const m = msg.text.match(/모델: (\S+) \/ (\S+)/);
            if (m) {
              $('stt-model').textContent = `whisper-${m[1]}`;
              $('ai-model').textContent = m[2];
            }
          }
        } else if (msg.type === 'transcript') {
          appendTranscript(msg.text);
          $('status-bar').textContent = '전사 중...';
          $('status-bar').style.color = '';
        } else if (msg.type === 'summary') {
          appendSummary(msg.text);
        } else if (msg.type === 'metrics') {
          renderMetrics(msg.data);
        } else if (msg.type === 'error') {
          $('status-bar').textContent = '⚠ ' + msg.text;
          $('status-bar').style.color = 'var(--neg)';
        }
      };

      ws.onerror = () => {
        $('status-bar').textContent = '⚠ 연결 오류';
        $('status-bar').style.color = 'var(--neg)';
      };

      ws.onclose = () => {
        $('btn-start').disabled = false;
        $('btn-stop').disabled = true;
        $('btn-analyze').disabled = true;
        $('dot').classList.remove('recording');
        $('status-bar').textContent = '연결 종료';
        $('status-bar').style.color = '';
        stopElapsed();
      };
    }

    $('btn-start').onclick = () => {
      isFirstTranscript = true;
      wordCount = 0;
      $('word-count').textContent = '0 단어';
      $('summary-panel').innerHTML = '<div class="empty-hint">지정된 시간마다 자동으로 업데이트됩니다.<br>⚡ 즉시 분석 버튼으로 강제 실행 가능.</div>';
      $('metrics-panel').innerHTML = '<div class="empty-hint">EPS, 매출, 가이던스 등<br>언급된 지표를 자동 추출합니다.</div>';
      connect($('whisper-lang').value);
    };

    $('btn-stop').onclick = () => {
      if (ws) ws.send('stop');
      setTimeout(() => ws && ws.close(), 300);
    };

    $('btn-analyze').onclick = () => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send('analyze_now');
        $('status-bar').textContent = '⚡ 즉시 분석 요청 중...';
      }
    };

    function rehighlightAll() {
      document.querySelectorAll('.transcript-line').forEach(div => {
        if (!div.dataset.raw) return;
        const ts = div.querySelector('.ts').outerHTML;
        div.innerHTML = ts + highlightKeywords(div.dataset.raw);
      });
    }

    // -- 전사 검색 --
    function searchTranscript(query) {
      const panel = $('transcript-panel');
      const lines = panel.querySelectorAll('.transcript-line');
      let matchCount = 0;

      lines.forEach(div => {
        if (!div.dataset.raw) return;
        const ts = div.querySelector('.ts').outerHTML;
        let text = highlightKeywords(div.dataset.raw);

        if (query) {
          const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const regex = new RegExp(`(${escaped})`, 'gi');
          const matches = text.match(regex);
          if (matches) matchCount += matches.length;
          text = text.replace(regex, '<mark class="search-match">$1</mark>');
        }

        div.innerHTML = ts + text;
      });

      $('search-count').textContent = query ? `${matchCount}건` : '';

      // 첫 번째 결과로 스크롤
      if (query) {
        const first = panel.querySelector('mark.search-match');
        if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }

    function clearSearch() {
      $('search-input').value = '';
      $('search-count').textContent = '';
      rehighlightAll();
    }

    $('btn-search').onclick = () => searchTranscript($('search-input').value.trim());
    $('btn-search-clear').onclick = clearSearch;
    $('search-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') searchTranscript($('search-input').value.trim());
    });

    // -- 패널 hide/토글 --
    const PANEL_COLLAPSED_W = 48;

    function updatePanelLayout() {
      const grid = document.querySelector('.panels');
      const panels = [...document.querySelectorAll('.panel')];
      const visiblePanels = panels.filter(p => !p.classList.contains('hidden'));
      const collapsedCount = panels.length - visiblePanels.length;

      panels.forEach(p => {
        const btn = p.querySelector('.panel-toggle');
        btn.textContent = '=';
      });

      document.querySelectorAll('.panel-toggle').forEach(btn => {
        const panel = btn.closest('.panel');
        if (panel.classList.contains('hidden')) {
          btn.disabled = false;
        } else {
          btn.disabled = visiblePanels.length <= 1;
        }
      });

      const totalWidth = grid.clientWidth;
      if (totalWidth === 0) {
        grid.style.gridTemplateColumns = '1fr 1fr 1fr';
        return;
      }

      const gapTotal = panels.length - 1;
      const availableWidth = totalWidth - gapTotal - (collapsedCount * PANEL_COLLAPSED_W);
      const perVisible = visiblePanels.length > 0 ? availableWidth / visiblePanels.length : 0;

      const colWidths = panels.map(p =>
        p.classList.contains('hidden') ? `${PANEL_COLLAPSED_W}px` : `${Math.floor(perVisible)}px`
      );
      grid.style.gridTemplateColumns = colWidths.join(' ');
    }

    document.querySelectorAll('.panel-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const panel = btn.closest('.panel');
        panel.classList.toggle('hidden');
        updatePanelLayout();
      });
    });

    document.addEventListener('DOMContentLoaded', () => {
      ['keyword-pos', 'keyword-neg'].forEach(id => {
        $(id).addEventListener('input', rehighlightAll);
      });
      $('keyword-pos').value = DEFAULT_KEYWORDS.pos.join(', ');
      $('keyword-neg').value = DEFAULT_KEYWORDS.neg.join(', ');

      const grid = document.querySelector('.panels');
      grid.style.transition = 'none';
      updatePanelLayout();
      grid.offsetHeight;
      grid.style.transition = '';
    });
  </script>
</body>

</html>
